name: CI/CD — Hackonomics-2026 (Django)

on:
  push:
    branches: [dev]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/hackonomics-history/hackonomics-2026
  APP_NAME: hackonomics-app
  RELEASE_NAME: hackonomics
  NAMESPACE: hackonomics
  INFRA_REPO: syjoe02/Hackonomics-Infra

jobs:
  # ──────────────────────────────────────────────
  # 1. Test
  # ──────────────────────────────────────────────
  test:
    name: Django Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hackonomics_test
          POSTGRES_USER: hackonomics
          POSTGRES_PASSWORD: test-password
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U hackonomics"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpq-dev librdkafka-dev libffi-dev pkg-config

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          # Install CPU-only torch first to avoid downloading GPU wheels
          pip install torch==2.3.1+cpu --extra-index-url https://download.pytorch.org/whl/cpu
          pip install --no-cache-dir -r requirements.txt

      - name: Create test env file
        run: |
          mkdir -p env
          cat > env/.env << 'EOF'
          DJANGO_ENV=local
          DJANGO_SECRETKEY=ci-test-secret-key-for-testing
          DEBUG=true
          POSTGRES_DB=hackonomics_test
          POSTGRES_USER=hackonomics
          POSTGRES_PASSWORD=test-password
          POSTGRES_HOST=localhost
          POSTGRES_PORT=5432

          REDIS_URL=redis://localhost:6379/0
          CENTRAL_AUTH_BASE_URL=http://localhost:8081
          CENTRAL_AUTH_SERVICE_KEY=ci-test-service-key
          EXPECTED_JWT_ISSUER=http://localhost:4444/
          EXPECTED_JWT_AUDIENCE=hackonomics
          KAFKA_BOOTSTRAP_SERVERS=localhost:9092
          EOF

      - name: Run migrations
        run: python manage.py migrate --run-syncdb

      - name: Run tests
        run: |
          pytest \
            --ignore=loadtest \
            -v \
            --tb=short \
            -q

  # ──────────────────────────────────────────────
  # 2. Build & Push Docker image to GHCR
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Derive image tag
        id: meta
        run: |
          TAG="sha-$(git rev-parse --short=8 HEAD)"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_TAG=${TAG}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # 3. Deploy to k3s cluster + Health Check
  #
  # Runs on an ARC (Actions Runner Controller) runner set. ARC runner pods are
  # ephemeral: the pod is created when this job is queued and is automatically
  # terminated by the ARC controller once the job completes (pass or fail).
  #
  # Docker-in-Docker (DinD) is provided as a sidecar service so that k3d and
  # docker CLI commands can run inside the runner pod without requiring a
  # privileged host-mounted Docker socket.
  #
  # Kubeconfig:
  #   Store the k3d cluster kubeconfig as KUBECONFIG_B64 in repository secrets
  #   (base64-encoded). The server address must be reachable from within the
  #   runner pod — typically the host node IP + k3d API port, e.g.:
  #     k3d kubeconfig get hackonomics-dev | \
  #       sed 's|https://0.0.0.0:|https://<host-ip>:|' | \
  #       base64 | gh secret set KUBECONFIG_B64
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy & Health Check
    runs-on: arc-runner-set
    needs: build-and-push

    # DinD sidecar — shares the pod's network namespace with the runner
    # container, so DOCKER_HOST=tcp://localhost:2375 reaches the daemon.
    services:
      dind:
        image: docker:24-dind
        options: --privileged
        env:
          DOCKER_TLS_CERTDIR: ""

    env:
      DOCKER_HOST: tcp://localhost:2375
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Checkout Infra repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRA_REPO }}
          token: ${{ secrets.INFRA_REPO_PAT }}
          path: infra

      - name: Configure kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          mkdir -p "${HOME}/.kube"
          echo "${KUBECONFIG_B64}" | base64 -d > "${HOME}/.kube/config"
          chmod 600 "${HOME}/.kube/config"
          # Verify the API server is reachable before proceeding
          kubectl cluster-info

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.x"

      - name: Deploy hackonomics-app chart
        env:
          IMAGE_REPO: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          helm upgrade --install hackonomics-app \
            "${{ github.workspace }}/infra/helm/hackonomics-app" \
            --namespace "${{ env.NAMESPACE }}" \
            --create-namespace \
            --values "${{ github.workspace }}/infra/helm/hackonomics-app/values-k3s-dev.yaml" \
            --set web.image.repository="${IMAGE_REPO}" \
            --set web.image.tag="${IMAGE_TAG}" \
            --set worker.image.repository="${IMAGE_REPO}" \
            --set worker.image.tag="${IMAGE_TAG}" \
            --set beat.image.repository="${IMAGE_REPO}" \
            --set beat.image.tag="${IMAGE_TAG}" \
            --wait --timeout 5m

      - name: Wait for rollout
        run: |
          kubectl -n "${{ env.NAMESPACE }}" rollout status \
            deployment/hackonomics-app-web --timeout=120s
          kubectl -n "${{ env.NAMESPACE }}" rollout status \
            deployment/hackonomics-app-worker --timeout=120s
          kubectl -n "${{ env.NAMESPACE }}" rollout status \
            deployment/hackonomics-app-beat --timeout=120s

  # ──────────────────────────────────────────────
  # 4. Create Draft PR → main
  #
  # Runs only after a successful deploy. Implements the Agent Listing Protocol:
  # the PR body carries a full audit trail of which CI agents ran and their
  # outcomes, so reviewers can see the complete promotion path at a glance.
  #
  # If a dev→main PR already exists (open or draft), the step is skipped to
  # avoid duplicate PRs on rapid pushes.
  # ──────────────────────────────────────────────
  create-draft-pr:
    name: Draft PR → main
    runs-on: arc-runner-set
    needs: [build-and-push, deploy]
    if: needs.deploy.result == 'success'
    permissions:
      contents: read
      pull-requests: write

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
      IMAGE_NAME: ${{ env.IMAGE_NAME }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create draft PR to main
        run: |
          # Skip if a dev→main PR is already open
          EXISTING=$(gh pr list --base main --head dev --state open --json number --jq '.[0].number // empty')
          if [[ -n "$EXISTING" ]]; then
            echo "PR #${EXISTING} already open — skipping creation"
            exit 0
          fi

          cat > /tmp/pr-body.md << EOF
          ## Summary

          - **App:** hackonomics-2026 (Django)
          - **Image:** \`${IMAGE_NAME}:${IMAGE_TAG}\`
          - **Cluster:** hackonomics-dev (k3d)
          - **Deployments:** \`hackonomics-hackonomics-app-{web,worker,beat}\` in namespace \`hackonomics\`

          ## Deployment Checklist

          - [x] Django tests passed (pytest, Postgres + Redis services)
          - [x] Docker image built and pushed to GHCR
          - [x] Deployed to \`hackonomics-dev\` via \`test-app.sh\`
          - [x] \`kubectl rollout status\` passed for web, worker, and beat
          - [ ] Peer review
          - [ ] Merge to \`main\` to trigger production promotion

          ## Agent Listing

          | Agent | Runner | Outcome |
          |-------|--------|---------|
          | \`test\` (Django Test) | ubuntu-latest | ✅ passed |
          | \`build-and-push\` | ubuntu-latest | ✅ pushed \`${IMAGE_TAG}\` |
          | \`deploy\` | arc-runner-set (ephemeral) | ✅ health check passed |
          | \`create-draft-pr\` | arc-runner-set (ephemeral) | ✅ this PR |

          ---
          *Promoted from \`dev\` by CI — [run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*
          EOF

          gh pr create \
            --draft \
            --base main \
            --head dev \
            --title "deploy(hackonomics-app): promote ${IMAGE_TAG} to main" \
            --body-file /tmp/pr-body.md
