services:
  web:
    build: .
    container_name: myeconocoach-web
    command: gunicorn -c gunicorn.conf.py config.wsgi:application
    env_file:
      - ./env/.env.prod
    ports:
      - "8000:8000"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - default
      - shared-monitor-net
    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: myeconocoach-pgbouncer
    env_file:
      - ./env/.env.prod
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - POOL_MODE
      - MAX_CLIENT_CONN
      - DEFAULT_POOL_SIZE
      - MIN_POOL_SIZE
      - RESERVE_POOL_SIZE
      - RESERVE_POOL_TIMEOUT
      - SERVER_RESET_QUERY
      - SERVER_LIFETIME
      - SERVER_IDLE_TIMEOUT
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: myeconocoach-db
    restart: always
    env_file:
      - ./env/.env.prod
    ports:
      - "5431:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: myeconocoach-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: myeconocoach-qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c '</dev/tcp/localhost/6333' 2>/dev/null && exit 0 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  kafka:
    image: apache/kafka:4.1.1
    container_name: myeconocoach-kafka
    restart: always
    env_file:
      - ./env/.env.prod
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: ${KAFKA_NODE_ID}
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: ${KAFKA_NODE_ID}@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  celery-worker:
    build: .
    container_name: myeconocoach-celery-worker
    command: celery -A config worker -l info
    env_file:
      - ./env/.env.prod
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    build: .
    container_name: myeconocoach-celery-beat
    command: celery -A config beat -l info --schedule /tmp/celerybeat-schedule
    env_file:
      - ./env/.env.prod
    volumes:
      - celerybeat_data:/app/celerybeat-schedule
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  outbox-worker:
    build: .
    container_name: myeconocoach-outbox-worker
    command: python manage.py process_outbox
    env_file:
      - ./env/.env.prod
    depends_on:
      pgbouncer:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure

  retry-worker-1:
    build: .
    container_name: myeconocoach-retry-worker-1
    command: python manage.py run_retry_consumer_1
    env_file:
      - ./env/.env.prod
    depends_on:
      pgbouncer:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  retry-worker-2:
    build: .
    container_name: myeconocoach-retry-worker-2
    command: python manage.py run_retry_consumer_2
    env_file:
      - ./env/.env.prod
    depends_on:
      pgbouncer:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  kafka_data:
  celerybeat_data:

networks:
  shared-monitor-net:
    external: true
